name: Bug Report
description: Create a bug report to help us improve CFRooms
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we trigger this bug?
      placeholder: |
        1. Open extension '...'
        2. Click on '...'
        3. Create room...
        4. See error
  - type: input
    id: version
    attributes:
      label: Extension Version / Chrome Version
      placeholder: "e.g., 0.1.0, Chrome 124"
    validations:
      required: true